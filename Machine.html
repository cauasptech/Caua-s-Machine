<!DOCTYPE html>
<html lang="pt-br"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supa Machine</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgb(27, 27, 27);
            margin: 0;
            padding: 0;
        }

        #container {
            width: 80%;
            margin: 50px auto;
            text-align: center;
        }

        h1 {
            color: green;
        }

        h3 {
            color: green;
        }

        input[type="text"] {
            padding: 8px;
            font-size: 16px;
            border-radius: 5px;
        }

        button {
            padding: 8px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            background-color: green;
            color: #FFFFFF;
            border: none;
        }

        #div_output {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background-color: black;
            border: 1px solid #63666A;
            text-align: left;
            display: none;
        }
    </style>
</head>

<body>

    <div id="container">
        <h1>Supa Machine</h1>

        <h3>Digite um número decimal:</h3>
        <input id="demo1" type="text" placeholder="Ex: 42" value="42">
        <br><br>

        <button onclick="converter()">Converter</button>

        <div id="div_output" style="display: block;"><b style="color: green;">Decimal inserido: </b><span style="color: green;">42</span><br><b style="color: green;">Valor Binário: </b><span style="color: green;">101010</span><br><b style="color: green;"> Valor Hexadecimal: </b><span style="color: green;">2a</span><br><b style="color: green;">Valor Octal: </b><span style="color: green;">52</span><br><br><b style="color: green;">Decimal inserido: </b><span style="color: green;">42</span><br><b style="color: green;">Valor Binário: </b><span style="color: green;">101010</span><br><b style="color: green;"> Valor Hexadecimal: </b><span style="color: green;">2a</span><br><b style="color: green;">Valor Octal: </b><span style="color: green;">52</span><br><br><b style="color: green;">Decimal inserido: </b><span style="color: green;">42</span><br><b style="color: green;">Valor Binário: </b><span style="color: green;">101010</span><br><b style="color: green;"> Valor Hexadecimal: </b><span style="color: green;">2a</span><br><b style="color: green;">Valor Octal: </b><span style="color: green;">52</span><br><br></div>
    </div>

    <script>
        function converter() {
            let decimal = Number(demo1.value);

            div_output.style.display = 'block';

            div_output.innerHTML += "<b style='color: green;'>Decimal inserido: </b>" + `<span style='color: green;'>${decimal}</span>` + '<br>';
            div_output.innerHTML += "<b style='color: green;'>Valor Binário: </b>" + `<span style='color: green;'>${decimal.toString(2)}</span>` + '<br>';
            div_output.innerHTML += "<b style='color: green;'> Valor Hexadecimal: </b>" + `<span style='color: green;'>${decimal.toString(16)}</span>` + '<br>';
            div_output.innerHTML += "<b style='color: green;'>Valor Octal: </b>" + `<span style='color: green;'>${decimal.toString(8)}</span>` + '<br><br>';
        }
    </script>



</body></html>
